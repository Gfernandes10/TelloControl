model:
  source_yaml: ../experiments_ident/ident_gazebo/identified_gammas.yaml
  uncertainty_pct: 0.10

controller:
  control_sign: -1.0
  v_limits: [0.5, 0.5, 0.5, 0.5]
  integral_limits: [0.005, 0.005, 0.008, 0.01]
  # q_scale = 0.00003 applied over base q_diag
  # State order:
  # [ex, evx, ey, evy, ez, evz, eyaw, evyaw, iex, iey, iez, ieyaw]
  q_diag: [0.00036, 0.00009, 0.00036, 0.00009, 4.8e-09, 1.2e-9, 0.00030000000000000003, 6e-05, 6e-05, 6e-05, 9e-05, 6e-05]
  # r_scale = 8000 applied over base r_diag
  r_diag: [8000.0, 8000.0, 8000.0, 8000.0]

synthesis:
  solver: CLARABEL
  solver_eps: 1.0e-5
  solver_max_iters: 25000
  lmi_eps: 1.0e-5
  pole_region:
    enable_alpha: false
    alpha: 0.0
    enable_damping_ratio: false
    zeta_min: 0.7
  input_saturation_lmi:
    enable: true
    u_limits: [0.5, 0.5, 0.5, 0.5]
  objective_w2_weight: 1.0e-4

simulation:
  dt: 0.02
  duration: 50.0
  settling_band: 0.02
  scenarios:
    - name: step_x
      axis: x
      amplitude: 0.2
      step_time: 0.5
    - name: step_y
      axis: y
      amplitude: 0.2
      step_time: 0.5
    - name: step_z
      axis: z
      amplitude: 0.2
      step_time: 0.5
    - name: step_yaw
      axis: yaw
      amplitude: 10.0
      unit: deg
      step_time: 0.5

validation:
  run_after_tuning: true
  simulate_worst_vertex: true

output:
  dir: ../experiments_lqi/robust_near_zero_ov
  save_plots: true
  save_csv: true
  ros_runtime_yaml: ../config/lqi_runtime_gazebo.yaml
  ros_runtime_base_yaml: ../config/lqi_runtime_gazebo.yaml
  ros_runtime_node_name: /tello_control_node
