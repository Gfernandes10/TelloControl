    lqi.yaw_conditional_anti_windup: true
    # LQI gain matrix K in row-major order (4x12):
    # u = control_sign * K * x_aug
    #
    # Augmented state order (columns):
    # [0] ex, [1] evx, [2] ey, [3] evy, [4] ez, [5] evz,
    # [6] eyaw, [7] evyaw, [8] iex, [9] iey, [10] iez, [11] ieyaw
    #
    # Control output order (rows):
    # row 0 -> ux, row 1 -> uy, row 2 -> uz, row 3 -> uyaw
    #
    # Index ranges in this flat vector:
    # k[ 0..11]  = row 0 (ux  <- all states above)
    # k[12..23]  = row 1 (uy  <- all states above)
    # k[24..35]  = row 2 (uz  <- all states above)
    # k[36..47]  = row 3 (uyaw<- all states above)
    #
    # Useful examples:
    # k[28] = K[2,4]  -> uz   <- ez
    # k[29] = K[2,5]  -> uz   <- evz
    # k[34] = K[2,10] -> uz   <- iez
    # k[42] = K[3,6]  -> uyaw <- eyaw
    # k[43] = K[3,7]  -> uyaw <- evyaw
    # k[47] = K[3,11] -> uyaw <- ieyaw
